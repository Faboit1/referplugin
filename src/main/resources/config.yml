# ─────────────────────────────────────────────────────────────────────────────
# AUTO-BROADCAST (periodic top-referrer announcements)
# ─────────────────────────────────────────────────────────────────────────────
auto-broadcast:
  enabled: false
  # Interval between broadcasts (minutes)
  interval-minutes: 60
  # How many top players to list
  top-count: 3
  # Lines of the broadcast message (supports colour codes & placeholders)
  message:
    - "&8&m----&r &6&lTop Referrers &8&m----"
    - "&e#1: &6%top_1_name% &7— &a%top_1_count% referrals"
    - "&e#2: &6%top_2_name% &7— &a%top_2_count% referrals"
    - "&e#3: &6%top_3_name% &7— &a%top_3_count% referrals"
    - "&8&m--------------------"

# ─────────────────────────────────────────────────────────────────────────────
# GUI — PLAYER PANEL
# ─────────────────────────────────────────────────────────────────────────────
gui:
  player:
    enabled: true
    # Inventory title (supports colour codes)
    title: "&6&lYour Referrals"
    # Number of rows (1–6)
    rows: 6

    # Filler item for empty slots
    filler:
      enabled: true
      material: BLACK_STAINED_GLASS_PANE
      name: " "

    # Sound played when the GUI is opened
    open-sound:
      enabled: true
      sound: BLOCK_CHEST_OPEN
      volume: 0.5
      pitch: 1.2

    # Sound played when the GUI is closed
    close-sound:
      enabled: false
      sound: BLOCK_CHEST_CLOSE
      volume: 0.5
      pitch: 1.0

    items:
      # Player skull / overview
      overview:
        slot: 13
        material: PLAYER_HEAD
        name: "&6&l%player%"
        lore:
          - "&7Profile: &e%referral_profile%"
          - ""
          - "&7Total Attempts: &f%referral_total%"
          - "&aSuccessful: &f%referral_count%"
          - "&cBlocked:    &f%referral_blocked%"

      # Successful referrals counter
      successful:
        slot: 20
        material: LIME_DYE
        name: "&a&lSuccessful Referrals"
        lore:
          - ""
          - "&f%referral_count% &7successful referrals"

      # Total rewards counter
      rewards:
        slot: 22
        material: SUNFLOWER
        name: "&6&lTotal Rewards"
        lore:
          - ""
          - "&f$%referral_total_rewards% &7earned in total"

      # Blocked referrals counter
      blocked:
        slot: 24
        material: RED_DYE
        name: "&c&lBlocked Referrals"
        lore:
          - ""
          - "&f%referral_blocked% &7blocked attempts"

      # Milestone progress bar
      milestone:
        slot: 31
        material: EXPERIENCE_BOTTLE
        name: "&b&lMilestone Progress"
        # Lore is generated dynamically — this provides the static header
        lore-header:
          - ""
        # Characters used for the progress bar
        bar-filled-char: "█"
        bar-empty-char: "█"
        bar-filled-colour: "&a"
        bar-empty-colour: "&8"
        bar-width: 20

      # Back / close navigation button (bottom-center)
      close-button:
        enabled: true
        slot: 49
        material: BARRIER
        name: "&cClose"
        lore:
          - "&7Click to close"

    # Slots used for the recent-history section (must be contiguous)
    history:
      start-slot: 37
      size: 8
      success-material: LIME_CONCRETE
      blocked-material: RED_CONCRETE
      # Date format for history entries
      date-format: "yyyy-MM-dd HH:mm"

  # ── ADMIN PANEL ─────────────────────────────────────────────────────────────
  admin:
    enabled: true
    title: "&c&lAdmin Panel"
    rows: 6

    filler:
      enabled: true
      material: GRAY_STAINED_GLASS_PANE
      name: " "

    open-sound:
      enabled: true
      sound: BLOCK_CHEST_OPEN
      volume: 0.5
      pitch: 0.8

    items:
      # Leaderboard header item
      leaderboard-header:
        slot: 0
        material: NETHER_STAR
        name: "&b&l✦ Top Referrers"
        lore:
          - "&7The all-time leaderboard"
      # How many leaderboard entries to show (fills slots 1 through N)
      leaderboard-size: 8

      # Suspicious activity header
      suspicious-header:
        slot: 18
        material: REDSTONE
        name: "&c&l⚠ Suspicious Activity"
        lore:
          - "&7Recent blocked / flagged referrals"
      # How many suspicious entries to show (fills slots 19 through N)
      suspicious-size: 8

      # Latest referrals header
      latest-header:
        slot: 27
        material: EMERALD
        name: "&a&l⟳ Latest Referrals"
        lore:
          - "&7The most recent successful referrals"
      # How many latest referral entries to show (fills slots 28 through N)
      latest-size: 8

      # Close / navigation button
      close-button:
        slot: 49
        material: BARRIER
        name: "&cClose"
        lore:
          - "&7Click to close"

    history:
      date-format: "yyyy-MM-dd HH:mm"

# ─────────────────────────────────────────────────────────────────────────────
# FORMATTING
# ─────────────────────────────────────────────────────────────────────────────
formatting:
  # Java DateTimeFormatter pattern used for all displayed dates/times
  date-format: "yyyy-MM-dd HH:mm"
  # Java ZoneId string for date/time display ("UTC", "Europe/Paris", etc.)
  timezone: "UTC"
  # Prefix string printed before money amounts
  currency-prefix: "$"
  # Suffix string printed after money amounts (leave empty for none)
  currency-suffix: ""
  # Decimal places shown for money
  money-decimals: 2
  # Java DecimalFormat pattern used for money
  number-format: "#,##0.##"

# ─────────────────────────────────────────────────────────────────────────────
# MESSAGES PREFIX
# ─────────────────────────────────────────────────────────────────────────────
# Prepended to every plugin chat message.  Set to '' to disable.
message-prefix: "&8[&6Refer&8] &r"
