# ── Per-player custom JOINER profiles ─────────────────────────────────────
custom-joiner-profiles: {}
#  somespecialplayer:
#    money: 500.0
#    xp: 100
#    commands:
#      - "kit give %joiner% starter"
#    notifications:
#      title:
#        enabled: true
#        title: "&b&lSpecial Welcome!"
#        subtitle: "&7You have a custom welcome reward"
#        fade-in: 10
#        stay: 80
#        fade-out: 20

# ── Permission-based reward multipliers ────────────────────────────────────
# Applied on top of the resolved profile rewards.
# stack: true → multiply each modifier together; false → take the highest
permission-modifiers:
  "referral.boost.1":
    money-multiplier: 1.5
    xp-multiplier: 1.5
    stack: true
    # referrer, joiner, or both
    apply-to: both
  "referral.boost.2":
    money-multiplier: 2.0
    xp-multiplier: 2.0
    stack: true
    apply-to: both
  "referral.boost.vip":
    money-multiplier: 3.0
    xp-multiplier: 2.5
    stack: false
    apply-to: referrer

