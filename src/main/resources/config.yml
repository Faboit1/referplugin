# ╔══════════════════════════════════════════════════════════════════════╗
# ║            ReferPlugin — Complete Configuration                     ║
# ║  Every single aspect of the plugin is controllable from here.       ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Colour codes: use & followed by the code.
#   &0-&9 / &a-&f = colours   &l bold &o italic &n underline &m strikethrough &r reset
#
# Common placeholders (available in most strings):
#   %referrer%               the referrer's username
#   %joiner%                 the joiner's username
#   %referral_host%          raw hostname the player connected with
#   %referral_count%         referrer's successful referral count
#   %referral_total%         referrer's total attempts
#   %referral_blocked%       referrer's blocked count
#   %referral_total_rewards% referrer's accumulated reward money (formatted)
#   %referral_profile%       active reward profile name
#   %money%                  money amount for the current reward event
#   %player%                 target player name
#   %top_N_name%             name of Nth leaderboard entry
#   %top_N_count%            successful referrals of Nth leaderboard entry

# ─────────────────────────────────────────────────────────────────────────────
# GENERAL
# ─────────────────────────────────────────────────────────────────────────────
general:
  # Print extra info to console. Useful while setting up; disable in production.
  debug: false
  # Log every successful referral to console
  log-referrals: true
  # Log every blocked/suspicious attempt to console
  log-blocked: true
  # Log every reward given to console
  log-rewards: true

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────────────────────────────────────
database:
  # SQLITE or MYSQL
  type: SQLITE

  sqlite:
    # File name (relative to the plugin data folder)
    file: data.db
    # Write-Ahead Logging for better concurrent performance
    wal-mode: true
    # NORMAL = safe and fast; FULL = safest; OFF = fastest (not recommended)
    synchronous: NORMAL
    # Enforce referential integrity
    foreign-keys: true

  mysql:
    host: localhost
    port: 3306
    database: referplugin
    username: root
    password: ""
    # Append custom parameters to the JDBC URL
    extra-params: "useSSL=false&serverTimezone=UTC&characterEncoding=utf8"
    pool:
      minimum-idle: 2
      maximum-pool-size: 10
      # Milliseconds to wait for a connection from the pool
      connection-timeout: 30000
      # Milliseconds before an idle connection is retired
      idle-timeout: 600000
      # Milliseconds before a connection is forcibly retired (should be < MySQL wait_timeout)
      max-lifetime: 1800000
      # Milliseconds between keepalive pings (0 = disabled)
      keepalive-time: 60000
      # Milliseconds before a leaked connection is logged (0 = disabled)
      leak-detection-threshold: 0

  # Automatically purge old records to keep the database lean
  pruning:
    enabled: true
    # Delete referral_records older than this many days
    records-older-than-days: 90
    # Delete referral_ip_log entries older than this many days
    ip-log-older-than-days: 30
    # How often to run the pruning task (hours)
    run-every-hours: 24

# ─────────────────────────────────────────────────────────────────────────────
# REDIS  (cross-server IP caching for Velocity / BungeeCord networks)
# ─────────────────────────────────────────────────────────────────────────────
redis:
  enabled: false
  host: localhost
  port: 6379
  # Leave empty for no password
  password: ""
  # Redis logical database index (0–15)
  database: 0
  # Connection / socket timeout (ms)
  timeout: 2000
  # Connection pool sizing
  pool:
    max-total: 8
    max-idle: 8
    min-idle: 0
  # How long (seconds) to cache a player's IP in Redis
  ip-cache-ttl: 86400
  # Key prefix (useful when sharing a Redis instance across plugins)
  key-prefix: "referplugin:"

# ─────────────────────────────────────────────────────────────────────────────
# HOSTNAME PARSING
# ─────────────────────────────────────────────────────────────────────────────
hostname:
  # The primary base domain to strip when parsing subdomains.
  # e.g. "faboit.cheesesmp.top" → referrer = "faboit"
  base-domain: "cheesesmp.top"

  # Additional base domains accepted (all checked in order)
  extra-domains: []
  #  - "cheesesmp.com"
  #  - "cheese.gg"

  # Strip a leading "www." before processing
  strip-www: true

  # Enforce a maximum length for extracted subdomains
  max-subdomain-length: 16
  # Enforce a minimum length
  min-subdomain-length: 3

  # Regex the subdomain must match (leave empty to skip regex check)
  # Default allows letters, digits and underscores, 3-16 chars
  subdomain-regex: "^[a-zA-Z0-9_]{3,16}$"

  # Manual overrides: subdomain (or full hostname) → exact Minecraft username
  # The subdomain key is case-insensitive.
  manual-overrides: {}
  #  mylink:  faboit
  #  support: AdminPlayerName

  # Subdomains to silently block — joins from these are treated as direct joins
  # (no referral recorded, no rewards given).
  # Supports * (any characters) and ? (single character) wildcards.
  # Case-insensitive.  Examples:
  #   play      — block exactly the "play" subdomain
  #   play*     — block any subdomain starting with "play" (play, playground, …)
  #   mc*       — block mc, mc2, …
  # When a player joins via a blocked subdomain, ALL existing referral records
  # that share the same IP address are also deleted and the affected referrers'
  # stats are corrected.
  blocked-subdomains: []
  #  - play
  #  - mc
  #  - java*

  # Allow referrers whose account cannot be found online (e.g. offline-mode servers).
  # When false, the referral is silently ignored if the referrer is not currently online.
  allow-offline-referrers: true

# ─────────────────────────────────────────────────────────────────────────────
# ANTI-ABUSE
# ─────────────────────────────────────────────────────────────────────────────
anti-abuse:
  # How to handle rule violations:
  #   strict  → block the referral entirely (no rewards given)
  #   relaxed → allow but apply a reduced reward multiplier
  enforcement: strict

  # Block a player from referring themselves
  self-referral-block: true

  # Prevent a player from being referred more than once ever
  already-referred-block: true

  # Block referrals from the same IP address
  same-ip-block: true

  # IPs that are never flagged (useful for LAN admins, testing)
  ip-whitelist:
    - "127.0.0.1"
    - "::1"

  # ── Cooldowns ──────────────────────────────────────────────────────────────
  # Hours a referrer must wait between valid referrals (0 = no cooldown)
  cooldown-hours: 24

  # Per-permission cooldown overrides (more specific beats the default)
  # Format:  "permission.node": hours
  cooldown-overrides:
    "referral.cooldown.12h": 12
    "referral.cooldown.6h": 6
    "referral.cooldown.1h": 1
    "referral.cooldown.none": 0

  # ── Caps ───────────────────────────────────────────────────────────────────
  # Maximum successful referrals per day (0 = unlimited)
  daily-cap: 10
  # Maximum successful referrals per week (0 = unlimited)
  weekly-cap: 50

  # Per-permission cap overrides
  cap-overrides:
    "referral.cap.20":        20
    "referral.cap.unlimited":  0

  # ── Relaxed mode ───────────────────────────────────────────────────────────
  # Reward multiplier applied when enforcement = relaxed and an IP overlap is found
  relaxed-reward-multiplier: 0.5

  # ── Suspicious activity logging ────────────────────────────────────────────
  # Write a separate log file for blocked/suspicious referral attempts
  log-suspicious-to-file: false
  suspicious-log-file: "suspicious.log"

# ─────────────────────────────────────────────────────────────────────────────
# REWARD PROFILES
# Each profile supports: money, xp, commands, items, chance-rewards,
# and per-event notification overrides (broadcast, title, actionbar, sound,
# fireworks).
# ─────────────────────────────────────────────────────────────────────────────

# ── Notification sub-section (reused inside each profile) ─────────────────
# broadcast:  enabled, message
# title:      enabled, title, subtitle, fade-in, stay, fade-out
# actionbar:  enabled, message, duration-ticks
# sound:      enabled, sound, volume, pitch
# fireworks:  enabled, count, power

reward-profiles:

  # ─── Default profile given to the player who REFERRED someone ───────────
  default_referrer:
    enabled: true
    # Vault money (requires Vault + an economy plugin)
    money: 500.0
    # Experience points
    xp: 100
    # Console commands run with full placeholder support
    commands: []
    #  - "eco give %referrer% 100"
    # Items to give (material + amount; items that don't fit are dropped)
    items: []
    #  - material: DIAMOND
    #    amount: 1
    # Chance-based bonus rewards
    chance-rewards: []
    #  - chance: 0.10          # 10 % probability
    #    money: 250.0
    #    xp: 50
    #    commands:
    #      - "broadcast &6%referrer% &egot a lucky bonus!"
    notifications:
      broadcast:
        enabled: false
        message: "&6%referrer% &ejust received a referral reward from &6%joiner%&e!"
      title:
        enabled: false
        title: "&6&lReferral!"
        subtitle: "&e%joiner% joined using your link"
        fade-in: 10
        stay: 60
        fade-out: 10
      actionbar:
        enabled: true
        message: "&6+$%money% &efrom referral reward!"
        # How long to show the action bar (ticks; 0 = single packet / client default)
        duration-ticks: 60
      sound:
        enabled: true
        # Any org.bukkit.Sound name
        sound: ENTITY_PLAYER_LEVELUP
        volume: 1.0
        pitch: 1.2
      fireworks:
        enabled: false
        count: 3
        power: 1

  # ─── Default profile given to the player who JOINED via a referral ──────
  default_joiner:
    enabled: true
    money: 250.0
    xp: 50
    commands: []
    items: []
    chance-rewards: []
    notifications:
      broadcast:
        enabled: false
        message: "&e%joiner% &7joined the server via &6%referrer%'s &7referral link!"
      title:
        enabled: true
        title: "&a&lWelcome!"
        subtitle: "&7You received a reward from &6%referrer%"
        fade-in: 10
        stay: 80
        fade-out: 20
      actionbar:
        enabled: true
        message: "&a+$%money% &ewelcome reward!"
        duration-ticks: 60
      sound:
        enabled: true
        sound: ENTITY_PLAYER_LEVELUP
        volume: 1.0
        pitch: 1.0
      fireworks:
        enabled: false
        count: 1
        power: 0

# ── Per-player custom REFERRER profiles ───────────────────────────────────
# Key = Minecraft username (case-insensitive)
