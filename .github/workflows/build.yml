name: Build ReferPlugin

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Paper plugin
        run: mvn --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Build Velocity companion plugin
        working-directory: velocity-plugin
        run: mvn --batch-mode --no-transfer-progress clean package -DskipTests

      - name: Collect JARs
        run: |
          mkdir -p dist
          cp target/referplugin-*.jar dist/
          cp velocity-plugin/target/refervelocity-*.jar dist/

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReferPlugin-1.0.0
          path: dist/
          if-no-files-found: error
